{
    "listen": [
        "socks5 0.0.0.0:1080",
        {"type": "http", "internal": "0.0.0.0:8080", "external": "0.0.0.0"}
    ],
    "access": {
        "clientRules": [
            "allow from all to all with auth staticAuth"
        ],
        "proxyRules": [
            "allow from all via staticAuth to all"
        ],
        "auth": {
            "staticAuth": {
                "type": "static",
                "username": "testuser",
                "password": "testpass"
            }
        }
    },
    "timeout": {
        "http": {
            "keepAlive": 30
        }
    }
}
